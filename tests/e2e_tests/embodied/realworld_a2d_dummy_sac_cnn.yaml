defaults:
  - env/realworld_a2d@env.train
  - env/realworld_a2d@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: /workspace/results/realworld_a2d_dummy_sac_cnn
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: always
  gamma: 0.8
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -14
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 20
    sample_window_size: 20
    min_buffer_size: 0
    auto_save: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: 28
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: True
      task_name: "A2D teleoperation"
      image_shapes:
        rgb_head: [128, 128, 3]
        rgb_left_hand: [128, 128, 3]
        rgb_right_hand: [128, 128, 3]
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: False

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: True
      task_name: "A2D teleoperation"
      image_shapes:
        rgb_head: [128, 128, 3]
        rgb_left_hand: [128, 128, 3]
        rgb_right_hand: [128, 128, 3]

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False

  model:
    precision: ${actor.model.precision}
    model_path: "/workspace/dataset/resnet"

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 128
  seed: 1234
  enable_offload: False

  model:
    model_path: "/workspace/dataset/resnet"
    image_num: 3
    state_dim: 28
    action_dim: 28
    action_scale: [-1, 1]

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
