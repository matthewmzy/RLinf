    max_steps_per_rollout_epoch: 96  # chunk-aligned for 8-step psi-policy execution
    max_episode_steps: 96

  eval:
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    override_cfg:
      is_dummy: False
      task_name: "A2D psi-policy SAC evaluation"
      step_frequency: 10.0
      max_num_steps: 96
      reset_on_env_reset: True
      policy_action_dim: 26
      normalize_actions: False
      clip_policy_actions: False
      reset_controller_action:
        [
          0.43599599599838257, 0.40000006556510925,
          1.483843207359314, -0.6396821141242981, -0.6142574548721313, -1.4895319938659668,
          1.0360413789749146, -0.8038167953491211, -1.021767258644104, -1.4656429290771484,
          0.8815041780471802, 0.1507505476474762, 1.0609948635101318, -1.4735652208328247,
          1.2199993133544922, 1.6188714504241943, 0.006837606895714998, 0.0,
          0.13968254625797272, 0.17142857611179352, 0.9335775375366211, 1.0,
          0.0, 0.0063492064364254475, 0.0, 0.0014652014942839742,
          0.9982905983924866, 0.9982905983924866,
        ]
      reset_move_timeout_s: 12.0
      reset_tolerance: 0.03
