rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/01.23_zjxc_v0.1_vit-small_rgb-state/checkpoints/epoch=2800-train_loss=0.14130-202603260123.ckpt"
    precision: bf16
    num_q_heads: 2
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 8
  seed: 1234
  enable_offload: False
  model:
    model_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/01.23_zjxc_v0.1_vit-small_rgb-state/checkpoints/epoch=2800-train_loss=0.14130-202603260123.ckpt"
    normalizer_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/01.23_zjxc_v0.1_vit-small_rgb-state/normalizer.pkl"
    action_dim: 26
    num_action_chunks: 8  # match psi-policy client execute_step
    num_q_heads: 2
    precision: bf16
  optim:
    clip_grad: 10.0
    lr: 3.0e-05
    lr_scheduler: torch_constant
  critic_optim:
    clip_grad: 10.0
    lr: 0.0003
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16

reward:
  use_reward_model: False

critic:
  use_critic_model: False
