defaults:
  - env/realworld_a2d@env.train
  - env/realworld_a2d@env.eval
  - model/psi_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor:
      node_group: "4090"
      placement: 0
    env:
      node_group: a2d
      placement: 0
    rollout:
      node_group: "4090"
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0
    - label: a2d
      node_ranks: 0
      hardware:
        type: A2D
        configs:
          - controller_host: "127.0.0.1"
            grpc_port: 12321
            container_name: "a2d-tele-release-2-1-0rc3-latest"
            auto_start_server: false
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "a2d_sac_psi_reset30_safe_explore"
    logger_backends: ["tensorboard"]
  max_epochs: 8000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  backup_entropy: False
  rollout_epoch: 1
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: auto
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  critic_actor_ratio: 4
  train_actor_steps: 20
  replay_buffer:
    enable_cache: False      # Real-robot RGB trajectories are too large to keep flattened in RAM.
    cache_size: 200          # Ignored when enable_cache=False; kept for quick local experiments.
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: True          # Persist trajectories to disk so sampling can load them on demand.
    enable_preload: True     # Prefetch replay/demo batches in a background thread while the robot is rolling out.
    prefetch_size: 4         # Keep a few ready-to-train batches so SAC does not pause as long between episodes.
  demo_buffer:
    enable_cache: False      # Intervention demos include full image trajectories; avoid RAM blow-ups.
    cache_size: 200          # Ignored when enable_cache=False.
    min_buffer_size: 1
    sample_window_size: 200
    auto_save: True          # Keep full intervention trajectories on disk instead of caching in memory.
    allow_replay_only_until_ready: True
  target_update_freq: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 26
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    ignore_terminations: False
    override_cfg:
      is_dummy: False
