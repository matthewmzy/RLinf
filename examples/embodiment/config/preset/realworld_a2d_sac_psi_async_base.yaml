cluster:
  num_nodes: 1
  component_placement:
    actor:
      node_group: "4090"
      placement: 0
    env:
      node_group: a2d
      placement: 0
    rollout:
      node_group: "4090"
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0
    - label: a2d
      node_ranks: 0
      hardware:
        type: A2D
        configs:
          - controller_host: "127.0.0.1"
            grpc_port: 12321
            container_name: "a2d-tele-release-2-1-0rc3-latest"
            auto_start_server: false
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "a2d_sac_psi_policy_async_base"
    logger_backends: ["tensorboard"]
  max_epochs: 8000
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1
  weight_sync_interval: 1
  resume_dir: null
  ckpt_path: /home/psibot/workspace_zhiyuan/RLinf/results/a2d_iql_20260417/critic_warmstart_chunk4_v08_latest_u1000_b16/actor_model_state_dict.pt
  offline_critic_warmup_updates: 0
  offline_critic_warmup_save_dir: null
  offline_critic_warmup_micro_batch_size: 32
  offline_critic_warmup_global_batch_size: 32

algorithm:
  update_epoch: 8
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  backup_entropy: False
  rollout_epoch: 1
  eval_rollout_epoch: 1
  staleness_threshold: null
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: auto
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  critic_actor_ratio: 4
  train_actor_steps: 20
  replay_buffer:
    enable_cache: False
    cache_size: 200
    min_buffer_size: 2
    sample_window_size: 200
    auto_save: True
    enable_preload: True
    prefetch_size: 4
    load_path: null
  demo_buffer:
    enable_cache: False
    cache_size: 200
    min_buffer_size: 1
    sample_window_size: 200
    auto_save: True
    allow_replay_only_until_ready: True
    load_path: null
  target_update_freq: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 26
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    ignore_terminations: False
    override_cfg:
      is_dummy: False
      controller_host: null
      controller_port: 12321
      container_name: null
      auto_start_server: False
      task_name: "A2D psi-policy SAC async"
      step_frequency: 10.0
      max_num_steps: 144
      reset_on_env_reset: True
      policy_action_dim: 26
      reset_controller_action: *a2d_reset_controller_action
      reset_move_timeout_s: 3.0
      reset_tolerance: 0.03
      model_control_modes: [0]
      teleop_control_modes: [1]
      idle_control_modes: [99]
      image_keys: ["rgb_head", "rgb_left_hand", "rgb_right_hand"]
      state_keys:
        ["arm_joint_states", "left_hand_states", "right_hand_states", "waist_joints_states"]
      image_shapes:
        rgb_head: [720, 1080, 3]
        rgb_left_hand: [720, 1080, 3]
        rgb_right_hand: [720, 1080, 3]
      state_shapes:
        arm_joint_states: [14]
        left_hand_states: [6]
        right_hand_states: [6]
        waist_joints_states: [2]
      safe_box:
        enabled: true
        low: *a2d_safe_box_low
        high: *a2d_safe_box_high
    max_steps_per_rollout_epoch: 144
    max_episode_steps: 144
  eval:
    total_num_envs: 1
    keyboard_reward_wrapper: single_stage
    override_cfg:
      is_dummy: False
      task_name: "A2D psi-policy SAC async eval"
      step_frequency: 10.0
      max_num_steps: 144
      reset_on_env_reset: True
      policy_action_dim: 26
      reset_controller_action: *a2d_reset_controller_action
      reset_move_timeout_s: 3.0
      reset_tolerance: 0.03
      model_control_modes: [0]
      teleop_control_modes: [1]
      idle_control_modes: [99]
      image_keys: ["rgb_head", "rgb_left_hand", "rgb_right_hand"]
      state_keys:
        ["arm_joint_states", "left_hand_states", "right_hand_states", "waist_joints_states"]
      image_shapes:
        rgb_head: [720, 1080, 3]
        rgb_left_hand: [720, 1080, 3]
        rgb_right_hand: [720, 1080, 3]
      state_shapes:
        arm_joint_states: [14]
        left_hand_states: [6]
        right_hand_states: [6]
        waist_joints_states: [2]
      safe_box:
        enabled: true
        low: *a2d_safe_box_low
        high: *a2d_safe_box_high
    max_steps_per_rollout_epoch: 144
    max_episode_steps: 144

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  sync_weight_nccl_max_ctas: 32
  collect_transitions: True
  collect_prev_infos: False
  action_execution:
    mode: direct
    noise_stage: pre_smooth
    reset_on_episode_end: true
    rtc:
      search_window: 4
      merge_weight_base: 0.8
    window:
      window_size: 8
      overlap_steps: 4
  model:
    model_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/2026.04.10/04.54_zjxc_v0.8_vit-small_rgb-state/checkpoints/latest.ckpt"
    normalizer_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/2026.04.10/04.54_zjxc_v0.8_vit-small_rgb-state/normalizer.pkl"
    precision: bf16
    noise_std_rollout: 0.005
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  sync_weight_no_wait: true
  recv_drain_max_trajectories: 32
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 32
  seed: 1234
  enable_offload: False
  model:
    model_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/2026.04.10/04.54_zjxc_v0.8_vit-small_rgb-state/checkpoints/latest.ckpt"
    normalizer_path: "/home/psibot/workspace_zhiyuan/psi-policy/data/outputs/2026.04.10/04.54_zjxc_v0.8_vit-small_rgb-state/normalizer.pkl"
    action_dim: 26
    num_action_chunks: 4
    use_chunk_rl: true
    num_q_heads: 2
    precision: bf16
    train_obs_encoder: false
    noise_std_train: 0.05
    noise_std_rollout: 0.005
  optim:
    clip_grad: 10.0
    lr: 3e-5
    lr_scheduler: torch_constant
  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16

reward:
  use_reward_model: False

critic:
  use_critic_model: False
