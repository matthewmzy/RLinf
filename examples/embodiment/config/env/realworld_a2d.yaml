env_type: realworld

total_num_envs: null

auto_reset: True
ignore_terminations: False
reward_mode: raw
wrap_obs_mode: simple
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 100
no_gripper: False
use_spacemouse: False
use_relative_frame: False
quat_to_euler: False
main_image_key: rgb_head

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "A2DEnv-v1"
  num_envs: null

